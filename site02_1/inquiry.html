    <header>

      <ul>
        <li><a href="#top">Top</a></li>

    <!-- <div class="main-visual">

    <div class="visual_slider">     
      <ul class="slider">
        <li class="slider-item slider-item01"></li>
        <li class="slider-item slider-item02"></li>
        <li class="slider-item slider-item03"></li>
      </ul>
      

    </div>
    <div id="top"><a href="" class="btn btn-border">オンライン予約</a></div>

  <main>
    <section>
     
     
          <table>
            <tr>
              <th><label for="name">お名前</label></th>
              <td>
                <input type="text"name="name"id="name"placeholder="例:山田 花子">
              </td>
            </tr>
            <tr>
              <th><label for="mail">メールアドレス</label></th>
            </td>
            
        </tr>
        <tr>
          <th>性別</th>
          <td>
            <input type="radio"name="gender"value="man"id="man">
            <label for="man">男性</label>
            <input type="radio"name="gender"value="woman"id="woman">
            <label for="woman">女性</label>
            <input type="radio"name="gender"value="none"id="none">
            <label for="none">無回答</label>
          </td>
        </tr>
        <tr>
        <th>都道府県</th>
        <td>
          <section name="local">
            <option>ここから選択してください</option>
            <option value="sapporo">札幌</option>
            <option value="tokyo">東京</option>
            <option value="osaka">大阪</option>
            <option value="kyoto">京都</option>
          </section>
        </td>
        </tr>
        <tr>
          <th>メルマガを希望する</th>
          <td>
          <input type="radio"name="magazine"value="yes"id="yes"checked>
          <label for="yes">希望する</label>
          <input type="radio"name="magazine"value="no"id="no">
          <label for="no">希望しない</label>
          </td>
        </tr>
        <tr>
          <th> <label for="comment">ご意見・お問い合わせ</label></th>
<td>
  <textarea name="comment"rows="6"id="comment"placeholder="ご意見・お問い合わせをこちらにご記入お願いします。"></textarea>
</td>
        </tr>
        <tr>
          <td colspan="2"class="send">
            <input type="submit"value="送信ボタン">
            <input type="reset"value="リセットボタン">
          </td>
        </tr>
          </table>
        </form>
    </section>
  </main>
